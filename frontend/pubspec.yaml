name: frontend
description: "Curated Essentials - minimalist personal shopping"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  provider: ^6.1.2
  http: ^1.3.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.3
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/lottie/
    - lib/assets/images/cars/
    - lib/assets/images/catalog/
    - lib/assets/images/equipments/
    - lib/assets/images/slideshow/
    - lib/assets/images/about us/
